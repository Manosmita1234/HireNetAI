<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="32" cy="32" r="28" fill="#0f0f23" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Neural network nodes - left side (H left bar) -->
  <circle cx="20" cy="16" r="4" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="20" cy="32" r="4" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="20" cy="48" r="4" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Neural network nodes - right side (H right bar) -->
  <circle cx="44" cy="16" r="4" fill="url(#grad2)" filter="url(#glow)"/>
  <circle cx="44" cy="32" r="5" fill="url(#grad2)" filter="url(#glow)"/>
  <circle cx="44" cy="48" r="4" fill="url(#grad2)" filter="url(#glow)"/>
  
  <!-- Neural connections - left bar -->
  <line x1="20" y1="16" x2="20" y2="48" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  
  <!-- Neural connections - right bar -->
  <line x1="44" y1="16" x2="44" y2="48" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
  
  <!-- Neural connections - cross connections (H middle bar) -->
  <line x1="20" y1="20" x2="44" y2="20" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
  <line x1="20" y1="32" x2="44" y2="32" stroke="url(#grad1)" stroke-width="2.5" opacity="0.8"/>
  <line x1="20" y1="44" x2="44" y2="44" stroke="url(#grad2)" stroke-width="2" opacity="0.4"/>
  
  <!-- Video play indicator (small triangle in center) -->
  <polygon points="28,26 28,38 38,32" fill="url(#grad1)" opacity="0.9"/>
</svg>
